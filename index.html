<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>蘇研之自行舉辦自己的世界盃</title>
  <!-- 載入 html2canvas 套件以支援圖片導出 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --primary-color: #5a7d7c;
      --accent-color: #d97757;
      --bg-color: #faf8f5;
      --card-bg: #ffffff;
      --text-color: #2b2b2b;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Heiti TC", "Microsoft JhengHei", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 16px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      color: var(--primary-color);
      margin: 8px 0 4px 0;
      text-align: center;
      font-weight: 600;
      font-size: 22px;
    }

    .subtitle {
      color: #767676;
      margin-bottom: 16px;
      text-align: center;
      font-size: 13px;
    }

    #game-container {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.05);
      padding: 24px 16px;
      width: 100%;
      max-width: 500px;
      text-align: center;
      border: 1px solid #eae5df;
    }

    .progress-bar {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary-color);
      margin-bottom: 16px;
    }

    .vs-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    @media (min-width: 400px) {
      .vs-container {
        flex-direction: row;
        align-items: stretch;
      }
    }

    .song-btn {
      flex: 1;
      padding: 18px 14px;
      font-size: 16px;
      font-weight: 500;
      border: 1.5px solid var(--primary-color);
      border-radius: 12px;
      background: white;
      color: var(--primary-color);
      cursor: pointer;
      transition: all 0.15s ease;
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.4;
      text-align: center;
      word-break: keep-all;
      overflow-wrap: break-word;
      -webkit-tap-highlight-color: transparent;
    }

    .song-btn:active {
      background: var(--primary-color);
      color: white;
      transform: scale(0.98);
    }

    .vs-divider {
      font-size: 16px;
      color: var(--accent-color);
      font-weight: bold;
      font-style: italic;
      padding: 4px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #results-container {
      display: none;
      width: 100%;
      max-width: 95vw;
      background: white;
      padding: 20px 12px;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.05);
      margin-top: 10px;
      border: 1px solid #eae5df;
    }

    /* 成果圖輸出區域 */
    #export-area {
      background: white;
      padding: 16px 8px;
      border-radius: 12px;
    }

    /* 頒獎台 */
    .podium-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 8px;
      margin: 10px auto 20px auto;
      max-width: 360px;
    }

    .podium-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .podium-crown { font-size: 20px; margin-bottom: 2px; }
    .podium-song {
      font-size: 12px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .podium-bar {
      width: 100%;
      border-radius: 8px 8px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 15px;
    }

    .podium-1 .podium-bar { height: 70px; background: #e09f67; }
    .podium-2 .podium-bar { height: 50px; background: #9bb0a5; }
    .podium-3 .podium-bar { height: 35px; background: #c5a880; }

    /* 對戰樹狀圖 (Tree Bracket) */
    .bracket-scroll-wrapper {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 10px 0;
      background: #faf8f5;
      border-radius: 12px;
      border: 1px solid #eae6e0;
    }

    .bracket-tree {
      display: flex;
      gap: 16px;
      padding: 10px;
      min-width: 820px;
      justify-content: space-between;
    }

    .bracket-round {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      flex: 1;
    }

    .round-title {
      font-size: 12px;
      font-weight: bold;
      color: var(--primary-color);
      text-align: center;
      margin-bottom: 12px;
      padding-bottom: 4px;
      border-bottom: 2px solid var(--primary-color);
    }

    .matchup {
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin: 6px 0;
      position: relative;
    }

    .team-box {
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 3px 5px;
      font-size: 11px;
      line-height: 1.2;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 115px;
    }

    .team-box + .team-box { margin-top: 2px; }

    .team-box.winner {
      background: #fceee9;
      border-color: var(--accent-color);
      color: var(--accent-color);
      font-weight: bold;
    }

    .team-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .matchup::after {
      content: "";
      position: absolute;
      right: -8px;
      top: 50%;
      width: 8px;
      height: 1px;
      background: #bbb;
    }

    .bracket-round:last-child .matchup::after { display: none; }

    /* 按鈕區塊 */
    .btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      max-width: 450px;
      margin-left: auto;
      margin-right: auto;
    }

    .action-btn {
      flex: 1;
      padding: 14px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-export {
      background: var(--accent-color);
      color: white;
    }

    .btn-restart {
      background: var(--primary-color);
      color: white;
    }

    /* 圖片預覽彈窗 */
    #image-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #image-modal img {
      max-width: 92%;
      max-height: 75vh;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .modal-tips {
      color: white;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
    }

    .modal-close {
      margin-top: 16px;
      padding: 10px 24px;
      background: white;
      color: #333;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>蘇研之自行舉辦自己的世界盃</h1>
  <div class="subtitle">不可能有人無聊到自己做給自己玩</div>

  <div id="game-container">
    <div id="start-overlay">
      <button class="action-btn btn-restart" onclick="initGame()" style="font-size: 17px; width:100%;">點擊開始🎵</button>
    </div>
    
    <div id="active-game" style="display: none;">
      <div class="progress-bar" id="progress">準備中...</div>
      <div class="vs-container">
        <button class="song-btn" id="optionA" onclick="selectSong(0)"></button>
        <div class="vs-divider">VS</div>
        <button class="song-btn" id="optionB" onclick="selectSong(1)"></button>
      </div>
    </div>
  </div>

  <div id="results-container">
    
    <!-- 會被輸出成圖片的區域 -->
    <div id="export-area">
      <div style="text-align:center; font-size:15px; font-weight:bold; color:var(--primary-color); margin-bottom:10px;">
        🎵 歌單爭霸賽結果 🏆
      </div>

      <!-- 前三名頒獎台 -->
      <div class="podium-container">
        <div class="podium-item podium-2">
          <div class="podium-song" id="champ-2">-</div>
          <div class="podium-bar">2</div>
        </div>
        <div class="podium-item podium-1">
          <div class="podium-crown">👑</div>
          <div class="podium-song" id="champ-1">-</div>
          <div class="podium-bar">1</div>
        </div>
        <div class="podium-item podium-3">
          <div class="podium-song" id="champ-3">-</div>
          <div class="podium-bar">3</div>
        </div>
      </div>

      <!-- 經典對戰樹狀圖 -->
      <div class="bracket-scroll-wrapper" id="scroll-wrapper-export">
        <div class="bracket-tree" id="visual-bracket-tree"></div>
      </div>
    </div>

    <!-- 功能按鈕區 -->
    <div class="btn-group">
      <button class="action-btn btn-export" onclick="exportAsImage()">📸 匯出成果圖片</button>
      <button class="action-btn btn-restart" onclick="initGame()">再玩一次 🔄</button>
    </div>
  </div>

  <!-- 圖片導出彈窗 -->
  <div id="image-modal">
    <img id="exported-img" src="" alt="成果圖" />
    <div class="modal-tips">💡 長按圖片即可儲存至手機相簿 / 分享</div>
    <button class="modal-close" onclick="closeModal()">關閉</button>
  </div>

  <script>
    const rawSongs = [
      "匱乏的模樣", "傾訴對象", "愚蠢的樂觀", "時差", "一片海", 
      "好人", "討人厭的文藝少女", "就要去見你", "幻覺與直覺", "祝你", 
      "背面", "向性", "一年到晚", "無人追問", "下雨了", 
      "有些風景不屬於我", "今天", "告訴我", "陪我走到路口", "未必", 
      "擁抱不一定總是互相", "某種", "告別的時候", "很抱歉", "假話", 
      "禮物", "i can't deny", "現在還有時間嗎", "稍微溫暖", "眷戀", 
      "我們是否還在同一個季節", "說說"
    ];

    let roundsData = [];
    let currentRoundSongs = [];
    let nextRoundSongs = [];
    let currentPairIndex = 0;
    let roundNames = ["32強賽", "16強賽", "8強賽", "準決賽", "決賽"];
    let currentRoundIndex = 0;

    function shuffle(array) {
      let arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initGame() {
      roundsData = [];
      currentRoundIndex = 0;
      currentPairIndex = 0;
      nextRoundSongs = [];
      currentRoundSongs = shuffle(rawSongs);
      
      document.getElementById("start-overlay").style.display = "none";
      document.getElementById("active-game").style.display = "block";
      document.getElementById("game-container").style.display = "block";
      document.getElementById("results-container").style.display = "none";
      
      renderMatch();
    }

    function renderMatch() {
      const totalPairs = currentRoundSongs.length / 2;
      const progressText = `${roundNames[currentRoundIndex]} (${currentPairIndex + 1} / ${totalPairs})`;
      document.getElementById("progress").innerText = progressText;

      const songA = currentRoundSongs[currentPairIndex * 2];
      const songB = currentRoundSongs[currentPairIndex * 2 + 1];

      document.getElementById("optionA").innerText = songA;
      document.getElementById("optionB").innerText = songB;
    }

    function selectSong(selectedIndex) {
      const songA = currentRoundSongs[currentPairIndex * 2];
      const songB = currentRoundSongs[currentPairIndex * 2 + 1];
      const winner = selectedIndex === 0 ? songA : songB;
      const loser = selectedIndex === 0 ? songB : songA;

      if (!roundsData[currentRoundIndex]) {
        roundsData[currentRoundIndex] = [];
      }
      roundsData[currentRoundIndex].push({ songA, songB, winner, loser });

      nextRoundSongs.push(winner);
      currentPairIndex++;

      if (currentPairIndex * 2 >= currentRoundSongs.length) {
        if (nextRoundSongs.length === 1) {
          showResults(nextRoundSongs[0]);
        } else {
          currentRoundSongs = nextRoundSongs;
          nextRoundSongs = [];
          currentPairIndex = 0;
          currentRoundIndex++;
          renderMatch();
        }
      } else {
        renderMatch();
      }
    }

    function showResults(champion) {
      document.getElementById("game-container").style.display = "none";
      document.getElementById("results-container").style.display = "block";

      const finalMatch = roundsData[4][0];
      const runnerUp = finalMatch.loser;
      const semiLosers = roundsData[3].map(m => m.loser);
      const thirdPlace = semiLosers[0];

      document.getElementById("champ-1").innerText = champion;
      document.getElementById("champ-2").innerText = runnerUp;
      document.getElementById("champ-3").innerText = thirdPlace;

      // 渲染樹狀圖 (Tree Bracket)
      const bracketContainer = document.getElementById("visual-bracket-tree");
      bracketContainer.innerHTML = "";

      roundNames.forEach((rName, rIdx) => {
        const roundDiv = document.createElement("div");
        roundDiv.className = "bracket-round";

        const title = document.createElement("div");
        title.className = "round-title";
        title.innerText = rName;
        roundDiv.appendChild(title);

        const matches = roundsData[rIdx];
        matches.forEach(m => {
          const matchDiv = document.createElement("div");
          matchDiv.className = "matchup";

          const isAWinner = m.winner === m.songA;

          matchDiv.innerHTML = `
            <div class="team-box ${isAWinner ? 'winner' : ''}">
              <span class="team-name">${m.songA}</span>
              <span>${isAWinner ? '✓' : ''}</span>
            </div>
            <div class="team-box ${!isAWinner ? 'winner' : ''}">
              <span class="team-name">${m.songB}</span>
              <span>${!isAWinner ? '✓' : ''}</span>
            </div>
          `;
          roundDiv.appendChild(matchDiv);
        });

        bracketContainer.appendChild(roundDiv);
      });

      // 冠軍欄位
      const champRoundDiv = document.createElement("div");
      champRoundDiv.className = "bracket-round";
      champRoundDiv.innerHTML = `
        <div class="round-title" style="color: var(--accent-color);">👑 總冠軍</div>
        <div class="matchup">
          <div class="team-box winner" style="font-size: 12px; height: 32px;">
            <span class="team-name">${champion}</span>
            <span>🏆</span>
          </div>
        </div>
      `;
      bracketContainer.appendChild(champRoundDiv);
    }

    function exportAsImage() {
      const exportElement = document.getElementById("export-area");
      const wrapper = document.getElementById("scroll-wrapper-export");

      // 導出時暫時展開溢出，確保橫向樹狀圖完整截圖不被切掉
      const originalOverflow = wrapper.style.overflowX;
      wrapper.style.overflowX = "visible";

      html2canvas(exportElement, {
        scale: 2, // 高解析度
        useCORS: true,
        backgroundColor: "#ffffff"
      }).then(canvas => {
        wrapper.style.overflowX = originalOverflow;
        const imgData = canvas.toDataURL("image/png");
        document.getElementById("exported-img").src = imgData;
        document.getElementById("image-modal").style.display = "flex";
      }).catch(err => {
        wrapper.style.overflowX = originalOverflow;
        alert("產生圖片失敗，請稍後再試！");
      });
    }

    function closeModal() {
      document.getElementById("image-modal").style.display = "none";
    }

    window.onload = function() {
      initGame();
    };
  </script>
</body>
</html>
